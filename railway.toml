# Railway: https://railway.com — connect this repo, set variables below, add a volume for SQLite.
# See README.md §12 (Railway deployment).
# Root Dockerfile (if present) is used for the image; it pins Node to docker.io/node:20-bookworm-slim.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# SQLite is a single file — multiple replicas get separate filesystems or break locking.
# Keep this at 1 or logins will randomly fail (wrong DB / empty User table).
numReplicas = 1
# Do not set startCommand here — it locks Railway’s “Custom Start Command” UI for every service.
# Web: Dockerfile CMD runs ./docker-entrypoint.sh (Prisma + next start).
# Twitch bridge service: set in Railway only — e.g. npm run twitch-bridge
restartPolicyType = "ON_FAILURE"
